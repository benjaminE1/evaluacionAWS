version: "3.8"

services:
  app:
    build: .
    container_name: laravel_app
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      BD_PORT: 3306
      BD_DATABASE: laravel
      BD_USERNAME: root
      BD_PASSWORD: root

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: tankpedia
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
