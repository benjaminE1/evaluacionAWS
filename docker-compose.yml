version: "3.8"

services:
  app:
    build: .
    container_name: laravel_app
    restart: always
    volumes:
      - .:/var/www
    ports:
      - "80:8000"
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: tankpedia
      DB_USERNAME: root
      DB_PASSWORD: root

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: tankpedia
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
